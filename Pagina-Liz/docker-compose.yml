version: '3.8'

services:
  db:
    image: mongo:4.4
    restart: always
    volumes:
      - ./data/db:/data/db
      - ./init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.production
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://db:27017/resources
      - JWT_SECRET=supersecret123
      - PORT=3000
      - CORS_ORIGIN=*
      - NODE_ENV=production
    volumes:
      # Eliminamos el mapeo del código fuente y node_modules para optimizar recursos
      # y evitar problemas de permisos o bucles infinitos en servidores Ubuntu.
      - ./data/uploads:/data/uploads
      - ./data/assets:/data/assets
    depends_on:
      - db

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - "4200:4200"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend
