<div class="admin-login-wrapper">
  <div class="admin-login-box">
    <h3>Iniciar Sesión</h3>

    @if (errorMessage) {
      <div class="admin-alert admin-alert-error">
        {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="admin-field" style="margin-bottom: 1rem;">
        <label class="admin-label" for="username">Usuario</label>
        <input class="admin-input" type="text" id="username" [(ngModel)]="credentials.username" name="username" required>
      </div>
      <div class="admin-field" style="margin-bottom: 1.5rem;">
        <label class="admin-label" for="password">Contraseña</label>
        <input class="admin-input" type="password" id="password" [(ngModel)]="credentials.password" name="password" required>
      </div>
      <button type="submit" class="admin-btn admin-btn-primary" [disabled]="!loginForm.valid">Entrar</button>
    </form>
  </div>
</div>
