<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Estructura de Temario</h2>
  </div>

  <div class="row mb-4">
    <!-- Materias -->
    <div class="col-md-6 mb-3">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Materias</h5>
        </div>
        <div class="card-body">
          <form (submit)="createSubject()" class="d-flex gap-2 mb-3">
            <input type="text" class="form-control" placeholder="Ej. Programación I" [(ngModel)]="newSubjectName"
              name="subjectName" required>
            <button type="submit" class="btn btn-success" [disabled]="isSavingSub || !newSubjectName">
              <i class="bi bi-plus-circle me-1"></i> Añadir
            </button>
          </form>

          <div *ngIf="isLoading" class="text-center my-3">
            <div class="spinner-border text-primary" role="status"></div>
          </div>

          <ul class="list-group list-group-flush" *ngIf="!isLoading">
            <li *ngIf="subjects.length === 0" class="list-group-item text-muted text-center">
              No hay materias creadas.
            </li>
            <li *ngFor="let sub of subjects" class="list-group-item d-flex justify-content-between align-items-center">
              <span><strong>{{ sub.name }}</strong> <small class="text-muted ms-2">/{{ sub.slug }}</small></span>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteSubject(sub._id)" title="Eliminar materia">
                <i class="bi bi-trash"></i>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Secciones -->
    <div class="col-md-6 mb-3">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-secondary text-white">
          <h5 class="mb-0">Secciones (Unidades)</h5>
        </div>
        <div class="card-body">
          <form (submit)="createCategory()" class="mb-3">
            <div class="d-flex gap-2 mb-2">
              <select class="form-select" [(ngModel)]="newCategorySubjectId" name="subjectSelect" required>
                <option value="" disabled>Selecciona la Materia...</option>
                <option *ngFor="let sub of subjects" [value]="sub._id">{{ sub.name }}</option>
              </select>
            </div>
            <div class="d-flex gap-2">
              <input type="text" class="form-control" placeholder="Ej. Funciones" [(ngModel)]="newCategoryName"
                name="categoryName" required>
              <button type="submit" class="btn btn-success" [disabled]="isSavingCat || !newCategoryName || !newCategorySubjectId">
                <i class="bi bi-plus-circle me-1"></i> Añadir
              </button>
            </div>
          </form>

          <div *ngIf="isLoading" class="text-center my-3">
            <div class="spinner-border text-primary" role="status"></div>
          </div>

          <ul class="list-group list-group-flush" *ngIf="!isLoading">
            <li *ngIf="categories.length === 0" class="list-group-item text-muted text-center">
              No hay secciones creadas.
            </li>
            <li *ngFor="let cat of categories" class="list-group-item d-flex justify-content-between align-items-center">
              <div>
                <strong>{{ cat.name }}</strong>
                <br>
                <span class="badge bg-light text-dark border"><i class="bi bi-journal-bookmark me-1"></i>{{ cat.subjectId?.name || 'Sin Materia' }}</span>
              </div>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteCategory(cat._id)" title="Eliminar sección">
                <i class="bi bi-trash"></i>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
