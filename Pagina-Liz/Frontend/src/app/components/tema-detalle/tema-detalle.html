<div class="public-container">
  <h2 class="public-page-title">Detalles del Tema</h2>
  <div class="tema-content">
    @if (listaTemas && listaTemas.length > 0) {
      <div class="tema-lista">
        @for (tema of listaTemas; track tema) {
          <div class="tema-item">
            <span class="tema-icon"><i class="bi bi-file-text"></i></span>
            <span class="tema-texto">{{ tema }}</span>
          </div>
        }
      </div>
    } @else {
      <div class="empty-state">No hay temas disponibles.</div>
    }
  </div>
</div>
